name: ci

# 6.1.0 hangs the ci because racist reasons, we will enable debs install when 6.1.2 is out
env:
  R2V: 6.1.2

on:
  push:
  pull_request:


jobs:
  build-linux24:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Installing radare2 from git
      run: git clone --depth=1 https://github.com/radareorg/radare2 && radare2/sys/install.sh
#    - name: Installing radare2 release ${{env.R2V}}
#      run: https://raw.githubusercontent.com/radareorg/radare2/refs/heads/master/sys/install-debs.sh | bash
    - name: Building r2flutter
      run: make && make user-install
    - name: Basic Testing
      run: make test
    - name: Radare Testing
      run: rarun2 timeout=30 system="r2r -j1 -t 30 test/db/cmd"
    - name: Radare Extras Testing
      run: rarun2 timeout=30 system="r2r -j1 -t 30 test/db/extras"
